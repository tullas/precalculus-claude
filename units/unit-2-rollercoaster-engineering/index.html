<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sector 02 — Rollercoaster Engineering · Trajectory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Lora:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../assets/css/style.css">
<link rel="stylesheet" href="../../assets/css/lab.css">
</head>
<body>

<header class="topnav">
  <a class="topnav__brand" href="../../index.html">TRAJECTORY<span>.</span></a>
  <a class="topnav__back" href="../../index.html">← Mission Control</a>
</header>

<section class="mission-header wrap">
  <span class="eyebrow">Sector 02</span>
  <h1>Rollercoaster Engineering</h1>
  <p class="subtitle" id="target-brief">Loading inspection order…</p>
</section>

<div class="wrap">
  <div class="lab">
    <div class="lab__canvas-wrap">
      <canvas id="lab-canvas"></canvas>
    </div>
    <div class="lab__controls">
      <h3>Track blueprint</h3>

      <div class="control-row">
        <label for="slider-r1">r₁ — ground contact 1 <output id="out-r1">-4.0</output></label>
        <input type="range" id="slider-r1" min="-8" max="8" step="0.1" value="-4">
      </div>
      <div class="control-row">
        <label for="slider-r2">r₂ — ground contact 2 <output id="out-r2">0.0</output></label>
        <input type="range" id="slider-r2" min="-8" max="8" step="0.1" value="0">
      </div>
      <div class="control-row">
        <label for="slider-r3">r₃ — ground contact 3 <output id="out-r3">4.0</output></label>
        <input type="range" id="slider-r3" min="-8" max="8" step="0.1" value="4">
      </div>
      <div class="control-row">
        <label for="slider-a">a — launch power / sign <output id="out-a">0.10</output></label>
        <input type="range" id="slider-a" min="-1" max="1" step="0.05" value="0.1">
      </div>

      <div class="lab__readout" id="readout"></div>
      <div class="lab__status" id="status"></div>

      <button class="lab__button" id="check-btn">Certify track</button>
      <button class="lab__button" id="new-target-btn" style="background:transparent;color:var(--text-muted);border:1px solid var(--line);margin-top:8px;">New inspection order</button>
    </div>
  </div>
</div>

<section class="wrap">
  <div class="panel" id="mission-brief"></div>
</section>

<footer class="footer">Sector 02 of 06 · Trajectory Precalculus</footer>

<script src="../../assets/js/progress.js"></script>
<script src="../../assets/js/graph-engine.js"></script>
<script src="../../assets/js/md-render.js"></script>
<script src="lab.js"></script>
<script>
  TrajectoryMD.renderInto("mission-brief.md", document.getElementById("mission-brief"));
</script>
</body>
</html>
