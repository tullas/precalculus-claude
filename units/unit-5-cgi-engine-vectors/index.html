<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sector 05 — CGI Engine Vectors · Trajectory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Lora:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../assets/css/style.css">
<link rel="stylesheet" href="../../assets/css/lab.css">
</head>
<body>

<header class="topnav">
  <a class="topnav__brand" href="../../index.html">TRAJECTORY<span>.</span></a>
  <a class="topnav__back" href="../../index.html">← Mission Control</a>
</header>

<section class="mission-header wrap">
  <span class="eyebrow">Sector 05</span>
  <h1>CGI Engine Vectors</h1>
  <p class="subtitle" id="target-brief">Loading render order…</p>
  <div class="xp-badge" id="xp-badge">0 XP</div>
</section>

<div class="wrap">
  <div class="lab">
    <div class="lab__canvas-wrap">
      <canvas id="lab-canvas"></canvas>
    </div>
    <div class="lab__controls">
      <h3>Transform matrix</h3>

      <div class="control-row">
        <label for="slider-theta">θ — rotation <output id="out-theta">0.00π</output></label>
        <input type="range" id="slider-theta" min="0" max="6.2832" step="0.01" value="0">
      </div>
      <div class="control-row">
        <label for="slider-sx">sx — horizontal scale <output id="out-sx">1.00</output></label>
        <input type="range" id="slider-sx" min="0.3" max="2.5" step="0.05" value="1">
      </div>
      <div class="control-row">
        <label for="slider-sy">sy — vertical scale <output id="out-sy">1.00</output></label>
        <input type="range" id="slider-sy" min="0.3" max="2.5" step="0.05" value="1">
      </div>

      <div class="lab__readout" id="readout"></div>
      <div class="lab__status" id="status"></div>

      <button class="lab__button" id="check-btn">Render match</button>
      <button class="lab__button" id="new-target-btn" style="background:transparent;color:var(--text-muted);border:1px solid var(--line);margin-top:8px;">New render order</button>
    </div>
  </div>
</div>

<section class="wrap">
  <div class="panel" id="mission-brief"></div>
</section>

<footer class="footer">Sector 05 of 06 · Trajectory Precalculus</footer>

<script src="../../assets/js/progress.js"></script>
<script src="../../assets/js/graph-engine.js"></script>
<script src="../../assets/js/md-render.js"></script>
<script src="lab.js"></script>
<script>
  TrajectoryMD.renderInto("mission-brief.md", document.getElementById("mission-brief"));
</script>
</body>
</html>
